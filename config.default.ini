[DEFAULT]
# Hughes Power Watchdog Discovery Configuration

# How often to scan for new Power Watchdog devices when discovery is enabled (seconds)
scan_interval = 60

# Polling interval is now configurable via the GUI slider in the
# Power Watchdog Manager switches pane (100ms - 10000ms, default 5000ms).

# Reconnect backoff after BLE disconnect (seconds)
reconnect_delay = 10
reconnect_max_delay = 120

# Optional: comma-separated HCI names for scan + connect (e.g. hci1 for a USB dongle).
# If empty or omitted, bleak-connection-manager discovers and rotates adapters.
# bluetooth_adapters = hci1
